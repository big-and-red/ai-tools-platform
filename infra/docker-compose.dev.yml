services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    entrypoint: ["sh", "scripts/entrypoint.sh"]
    command: uvicorn app.main:app --reload --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/app
    environment:
      - STAND_NAME=local
    env_file:
      - ../backend/envs/local/local.env
      - ../backend/envs/docker/docker.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    entrypoint: ["sh", "scripts/entrypoint.sh"]
    command: celery -A app.celery_app worker --loglevel=info --concurrency=2
    volumes:
      - ../backend:/app
    environment:
      - STAND_NAME=local
    env_file:
      - ../backend/envs/local/local.env
      - ../backend/envs/docker/docker.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ../frontend:/app
      # Prevent host node_modules / .next from overriding the container's
      - /app/node_modules
      - /app/.next
    environment:
      # Browser-side (NEXT_PUBLIC_*): user's browser connects to host localhost:8000
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      # Server-side (SSR / Server Components): fetch runs inside Docker, use internal hostname
      - API_INTERNAL_URL=http://backend:8000
      # Enable file-watcher polling for Docker on macOS (fsevents not available in Linux containers)
      - WATCHPACK_POLLING=true
    depends_on:
      - backend
