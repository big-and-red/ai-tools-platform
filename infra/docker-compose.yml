services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: aimarket
      POSTGRES_USER: aimarket
      POSTGRES_PASSWORD: aimarket
    ports:
      - "5422:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aimarket"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
